services:
  postgres:
    image: postgres:16-alpine
    container_name: tractor-store-postgres
    environment:
      POSTGRES_DB: tractorstore
      POSTGRES_USER: tractor
      POSTGRES_PASSWORD: tractor
    ports:
      - "5432:5432"
    volumes:
      - tractor-store-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tractor -d tractorstore"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  tractor-store-pgdata:
