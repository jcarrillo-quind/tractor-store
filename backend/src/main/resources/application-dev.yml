server:
  port: 8080

tractor-store:
  persistence:
    mode: postgres

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/tractorstore
    username: tractor
    password: tractor
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.tractorstore: DEBUG
    org.springframework.web: INFO
    org.flywaydb: INFO
